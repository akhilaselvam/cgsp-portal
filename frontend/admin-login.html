<head>

      font-weight: 600;

  </style>
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <!-- MOBILE MENU DRAWER -->

  <div class="mobile-drawer">

    <!-- Header -->
    <div class="mobile-drawer-header">
      <div>
        <div class="logo-text">🏛️ CGSP</div>
        <div class="logo-sub">Centralized Government Schemes Portal</div>
      </div>

    <!-- Language switcher -->
    <div class="mobile-lang-bar">
      <span>🌐 Language / భాష / भाषा</span>
      <button class="mobile-lang-btn active" 
        onclick="applyLanguage('en');updateMobileLang('en')">English</button>
      <button class="mobile-lang-btn" 
        onclick="applyLanguage('te');updateMobileLang('te')">తెలుగు</button>
      <button class="mobile-lang-btn" 
        onclick="applyLanguage('hi');updateMobileLang('hi')">हिंदी</button>
    </div>

    <!-- Navigation Links -->
    <div class="mobile-drawer-links">
      <a href="index.html">
        <span class="link-icon">🏠</span>
        <span data-lang="nav_home">Home</span>
      </a>
      <a href="schemes.html">
        <span class="link-icon">📋</span>
        <span data-lang="nav_schemes">Schemes</span>
      </a>
      <a href="eligibility.html">
        <span class="link-icon">✅</span>
        <span data-lang="nav_eligibility">Eligibility Check</span>
      </a>
      <a href="about.html">
        <span class="link-icon">ℹ️</span>
        <span data-lang="nav_about">About Us</span>
      </a>
      <a href="contact.html">
        <span class="link-icon">📞</span>
        <span data-lang="nav_contact">Contact</span>
      </a>
    </div>

    <!-- Admin Button -->
    <div class="mobile-drawer-footer">
      <a href="admin-login.html" class="mobile-admin-btn">
        🔐 Admin Login
      </a>
    </div>

  </div>
</div>

<div class="box">
  <div class="admin-tag">🔐 Admin Portal</div>
  <h2>Admin Login</h2>
  <p class="sub">Sign in to manage government schemes</p>

  <div class="err-msg" id="err-msg"></div>

  <div class="form-group">
    <label>Admin Email</label>
    <input type="email" id="email" placeholder="enter admin email">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>

  <button class="btn-login" onclick="adminLogin()">🔐 Login as Admin</button>


  <div class="back-link">
    <a href="index.html">← Back to Public Portal</a>
  </div>
</div>

<script>
const API = 'https://cgsp-backend.onrender.com/api';

async function adminLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';

   function adminlogout(){
    if(confirm('Are you sure you want to logout')){
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href='admin-login.html';
    }
  }

  if (!email || !password) {
    errEl.textContent = '⚠️ Please enter email and password';
    errEl.style.display = 'block';
    return;
  }

  try {
    console.log('Trying login with:', email);

    const res = await fetch(`${API}/auth/admin-login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log('Response:', data);

    if (!res.ok) {
      errEl.textContent = '❌ ' + data.message;
      errEl.style.display = 'block';
      return;
    }

    localStorage.setItem('adminToken', data.token);
    localStorage.setItem('adminUser', JSON.stringify(data.admin));

    alert('✅ Login successful! Going to dashboard...');
    window.location.href = 'admin-dashboard.html';

  } catch (e) {
    console.error('Error:', e);
    errEl.textContent = '❌ Cannot connect to server. Is backend running on port 5000?';
    errEl.style.display = 'block';
  }
}
</script>
<script>
function toggleMenu() {
  const nav = document.querySelector('.nav-links');
  const ham = document.getElementById('hamburger');
  nav.classList.toggle('open');

  // Animate hamburger
  const spans = ham.querySelectorAll('span');
  if (nav.classList.contains('open')) {
    spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
    spans[1].style.opacity = '0';
    spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
  } else {
    spans[0].style.transform = 'none';
    spans[1].style.opacity = '1';
    spans[2].style.transform = 'none';
  }
}

// Close menu when link clicked
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    document.querySelector('.nav-links').classList.remove('open');
  });
});
</script>

</body>
</html>
