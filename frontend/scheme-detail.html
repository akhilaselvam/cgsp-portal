<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheme Details - CGSP</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f5f8ff;color:#1e293b;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:#fff;border-bottom:1.5px solid #e1e8f5;position:sticky;top:0;z-index:200;}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.nav-icon{width:36px;height:36px;background:#0f2557;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nav-links{display:flex;gap:6px;list-style:none;}
.nav-links a{padding:6px 13px;border-radius:7px;font-size:0.88rem;color:#64748b;text-decoration:none;font-weight:500;}
.nav-links a:hover{color:#2563eb;background:#eff4ff;}
.btn-admin{background:#0f2557;color:#fff;padding:8px 22px;border-radius:8px;font-size:0.88rem;font-weight:600;text-decoration:none;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:8px;}
.hamburger span{width:26px;height:2.5px;background:#0f2557;border-radius:3px;display:block;}
.page{padding:30px 60px 60px;max-width:1000px;margin:auto;}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#2563eb;font-size:0.9rem;font-weight:600;text-decoration:none;margin-bottom:20px;cursor:pointer;background:none;border:none;padding:0;font-family:'Segoe UI',sans-serif;}
.card{background:#fff;border-radius:16px;border:1.5px solid #e1e8f5;overflow:hidden;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;padding:30px 32px 22px;border-bottom:1.5px solid #f0f4ff;}
.badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.75rem;font-weight:700;margin-bottom:10px;}
.bs{background:#dbeafe;color:#1d4ed8;}
.ba{background:#dcfce7;color:#15803d;}
.bd{background:#ede9fe;color:#7c3aed;}
.bh{background:#fee2e2;color:#b91c1c;}
.card-top h1{font-size:1.5rem;color:#0f2557;font-weight:800;margin-bottom:8px;line-height:1.3;}
.card-top p{color:#64748b;font-size:0.92rem;line-height:1.75;max-width:560px;}
.card-icon{font-size:3.5rem;margin-left:16px;flex-shrink:0;}
.meta-bar{display:flex;gap:12px;flex-wrap:wrap;padding:18px 32px;background:#f8faff;border-bottom:1.5px solid #f0f4ff;}
.chip{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #e1e8f5;border-radius:8px;padding:7px 13px;font-size:0.82rem;color:#64748b;}
.chip strong{color:#1e293b;}
.tabs{display:flex;border-bottom:2px solid #e1e8f5;padding:0 32px;}
.tab{padding:13px 18px;font-size:0.88rem;font-weight:600;color:#64748b;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:'Segoe UI',sans-serif;}
.tab:hover{color:#2563eb;}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;}
.tc{display:none;padding:24px 32px;}
.tc.active{display:block;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.box{background:#f8faff;border-radius:12px;padding:18px;border:1.5px solid #e1e8f5;}
.box h4{font-size:0.93rem;color:#0f2557;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e1e8f5;}
.box ul{list-style:none;}
.box ul li{padding:6px 0;border-bottom:1px solid #f0f4ff;font-size:0.87rem;color:#444;display:flex;gap:7px;}
.box ul li:last-child{border:none;}
.box p{font-size:0.88rem;color:#444;line-height:1.75;}
.apply-bar{padding:22px 32px;border-top:1.5px solid #f0f4ff;background:#f8faff;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn-apply{display:inline-flex;align-items:center;gap:7px;background:#0f2557;color:#fff;padding:12px 26px;border-radius:10px;text-decoration:none;font-size:0.93rem;font-weight:700;transition:all 0.18s;cursor:pointer;border:none;}
.btn-apply:hover{background:#2563eb;transform:translateY(-2px);}
.btn-green{display:inline-flex;align-items:center;gap:7px;background:#16a34a;color:#fff;padding:12px 26px;border-radius:10px;text-decoration:none;font-size:0.93rem;font-weight:700;transition:all 0.18s;cursor:pointer;border:none;}
.btn-green:hover{background:#15803d;transform:translateY(-2px);}
.btn-grey{display:inline-flex;align-items:center;gap:7px;background:#94a3b8;color:#fff;padding:12px 26px;border-radius:10px;font-size:0.93rem;font-weight:700;cursor:not-allowed;}
.note{font-size:0.8rem;color:#64748b;width:100%;margin-top:2px;}
.loading-box{text-align:center;padding:80px 40px;background:#fff;border-radius:16px;border:1.5px solid #e1e8f5;}
.spinner{width:40px;height:40px;border:4px solid #e1e8f5;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{text-align:center;padding:60px 40px;background:#fff;border-radius:16px;border:1.5px solid #fecaca;}
.error-box h3{color:#b91c1c;margin-bottom:8px;}
.error-box p{color:#64748b;font-size:0.88rem;}
</style>
</head>
<body>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
  <div class="mobile-overlay" onclick="closeMenu()"></div>
  <div class="mobile-drawer">
    <div class="mobile-drawer-header">
      <div>
        <div class="logo-text">🏛️ CGSP</div>
        <div class="logo-sub">Centralized Government Schemes Portal</div>
      </div>
      <button class="close-btn" onclick="closeMenu()">✕</button>
    </div>
    <div class="mobile-drawer-links">
      <a href="index.html"><span class="link-icon">🏠</span> Home</a>
      <a href="schemes.html"><span class="link-icon">📋</span> Schemes</a>
      <a href="eligibility.html"><span class="link-icon">✅</span> Eligibility Check</a>
      <a href="about.html"><span class="link-icon">ℹ️</span> About Us</a>
      <a href="contact.html"><span class="link-icon">📞</span> Contact</a>
    </div>
    <div class="mobile-drawer-footer">
      <a href="admin-login.html" class="mobile-admin-btn">🔐 Admin Login</a>
    </div>
  </div>
</div>

<nav>
  <div class="nav-brand" onclick="location.href='index.html'">
    <div class="nav-icon">🏛️</div>
    <div>
      <div style="font-weight:700;color:#0f2557;font-size:0.95rem">CGSP</div>
      <div style="font-size:0.68rem;color:#888">Centralized Government Schemes Portal</div>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="schemes.html" class="active">Schemes</a></li>
    <li><a href="eligibility.html">Eligibility Check</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button class="hamburger" onclick="openMenu()">
    <span></span><span></span><span></span>
  </button>
  <a href="admin-login.html" class="btn-admin">Admin Login</a>
</nav>

<div class="page">
  <button class="back-btn" onclick="location.href='schemes.html'">← Back to Schemes</button>
  <div id="content">
    <div class="loading-box">
      <div class="spinner"></div>
      <p style="color:#64748b">Loading scheme details...</p>
    </div>
  </div>
</div>

<script>
// ===== IMPORTANT: Use Render backend URL =====
const API = 'https://cgsp-backend.onrender.com/api';

const BADGE = {
  'Student':'bs',
  'Agriculture':'ba',
  'Physically Challenged':'bd',
  'Health & Wellness':'bh'
};

const ICON = {
  'Student':'🎓',
  'Agriculture':'🌱',
  'Physically Challenged':'♿',
  'Health & Wellness':'❤️'
};

// Get ID from URL
function getId() {
  return new URLSearchParams(window.location.search).get('id');
}

// Show error message
function showErr(msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <div style="font-size:2rem;margin-bottom:12px">❌</div>
      <h3>Error Loading Scheme</h3>
      <p>${msg}</p>
      <br>
      <a href="schemes.html" 
        style="color:#2563eb;font-weight:600;text-decoration:none">
        ← Back to All Schemes
      </a>
    </div>`;
}

// Open link safely in new tab
function openLink(url) {
  if (url && url !== 'null' && url !== 'undefined' && url.startsWith('http')) {
    window.open(url, '_blank', 'noopener,noreferrer');
  } else {
    alert('Official link not available for this scheme. Please search on www.india.gov.in');
  }
}

// Load scheme from API
async function loadScheme() {
  const id = getId();

  if (!id) {
    showErr('No scheme selected. Please go back and click View Details on a scheme.');
    return;
  }

  try {
    const response = await fetch(API + '/schemes/' + id, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });

    if (response.status === 404) {
      showErr('This scheme was not found. It may have been removed by admin.');
      return;
    }

    if (!response.ok) {
      showErr('Server error. Please try again in a moment.');
      return;
    }

    const scheme = await response.json();

    if (!scheme || !scheme.title) {
      showErr('Scheme data is incomplete. Please go back and try another scheme.');
      return;
    }

    renderScheme(scheme);

  } catch (error) {
    console.error('Error:', error);
    showErr('Cannot connect to server. Please check internet connection and try again.');
  }
}

// Render scheme on page
function renderScheme(s) {
  // Parse comma separated fields safely
  function parseList(str) {
    if (!str || str === 'null' || str === 'undefined' || str.trim() === '') {
      return ['Visit official website for details'];
    }
    return str.split(',').map(x => x.trim()).filter(x => x.length > 0);
  }

  const elig = parseList(s.eligibility_criteria);
  const bens = parseList(s.key_benefits);
  const docs = parseList(s.required_documents);

  // Check if official link is valid
  const hasLink = s.official_link &&
                  s.official_link !== 'null' &&
                  s.official_link !== 'undefined' &&
                  s.official_link.trim() !== '' &&
                  s.official_link.startsWith('http');

  const linkUrl = hasLink ? s.official_link.trim() : null;

  document.getElementById('content').innerHTML = `
    <div class="card">

      <div class="card-top">
        <div>
          <span class="badge ${BADGE[s.category] || 'bs'}">${s.category || 'Government'}</span>
          <h1>${s.title}</h1>
          <p>${s.description || 'Government scheme for eligible citizens.'}</p>
        </div>
        <div class="card-icon">${ICON[s.category] || '🏛️'}</div>
      </div>

      <div class="meta-bar">
        <div class="chip">🏛️ <strong>${s.department || 'Government of India'}</strong></div>
        <div class="chip">💰 Income: <strong>${s.income_limit || 'N/A'}</strong></div>
        <div class="chip">🎁 Benefit: <strong>${s.benefit_amount || 'As per guidelines'}</strong></div>
        <div class="chip">💻 Mode: <strong>${s.application_mode || 'Online'}</strong></div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
        <button class="tab" onclick="switchTab('eligibility',this)">Eligibility</button>
        <button class="tab" onclick="switchTab('benefits',this)">Benefits</button>
        <button class="tab" onclick="switchTab('documents',this)">Documents</button>
      </div>

      <div class="tc active" id="tc-overview">
        <div class="two">
          <div class="box">
            <h4>📋 About the Scheme</h4>
            <p>${s.description || 'Government scheme for eligible citizens.'}</p>
          </div>
          <div class="box">
            <h4>👤 Who Can Apply?</h4>
            <ul>${elig.map(e => `<li>✅ ${e}</li>`).join('')}</ul>
          </div>
        </div>
        <div class="two" style="margin-top:16px">
          <div class="box">
            <h4>🎁 Key Benefits</h4>
            <ul>${bens.map(b => `<li>⭐ ${b}</li>`).join('')}</ul>
          </div>
          <div class="box">
            <h4>📄 Required Documents</h4>
            <ul>${docs.map(d => `<li>📎 ${d}</li>`).join('')}</ul>
          </div>
        </div>
      </div>

      <div class="tc" id="tc-eligibility">
        <div class="box">
          <h4>✅ Eligibility Criteria</h4>
          <ul>${elig.map(e => `<li>✅ ${e}</li>`).join('')}</ul>
        </div>
      </div>

      <div class="tc" id="tc-benefits">
        <div class="box">
          <h4>🎁 Key Benefits</h4>
          <ul>${bens.map(b => `<li>⭐ ${b}</li>`).join('')}</ul>
        </div>
      </div>

      <div class="tc" id="tc-documents">
        <div class="box">
          <h4>📄 Required Documents</h4>
          <ul>${docs.map(d => `<li>📎 ${d}</li>`).join('')}</ul>
        </div>
      </div>

      <div class="apply-bar">
        ${linkUrl
          ? `<button class="btn-apply" onclick="openLink('${linkUrl}')">
               📝 Apply Now
             </button>
             <button class="btn-green" onclick="openLink('${linkUrl}')">
               🌐 Visit Official Website
             </button>`
          : `<button class="btn-grey">📝 Apply Now — No Link Available</button>`
        }
        <p class="note">
          🔒 Apply Now opens the official government website in a new tab.
        </p>
      </div>

    </div>`;
}

// Switch tabs
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tc-' + name).classList.add('active');
}

// Mobile menu
function openMenu() {
  document.getElementById('mobile-menu').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.body.style.overflow = '';
}

// Load scheme when page opens
loadScheme();
</script>
</body>
</html>
